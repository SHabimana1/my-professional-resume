name: Build and Push to ECR
on: 
 push:
    #pull_requests:
     # branches : [ 'main' , 'dev']
      branches: ['main']

jobs:
 build_sacn:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the Code
      uses: actions/checkout@v7
    - name: Trivy  build_scan
      uses: aquasecurity/trivy-action@v0.28.0
      with:
        scan-type: 'fs'
        severity: HIGH,CRITICAL
        exit-code: 1
    - name: Build Docker Image
      run: docker built -t 444770235860.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .
    
    - name: Scan Image with Trivy
      uses: aquasecurity/trivy-action@0.36.0 
      with: 
          image-ref: 444770235860.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
          format: table 
          exit-code: 1 
          ignore-unfixed: true 
          severity: HIGH,CRITICAL
    - name: Push Image to ECR
      run: echo "push"


